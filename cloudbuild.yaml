steps:
  # 1. Build the image completely from scratch (bypassing the cache bug)
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "--no-cache",
        "-t",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/double-checkk-api:$COMMIT_SHA",
        "-f",
        "CloudRun/Dockerfile",
        "CloudRun",
      ]

  # 2. Push it to the modern Artifact Registry, NOT gcr.io
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/double-checkk-api:$COMMIT_SHA",
      ]

images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/double-checkk-api:$COMMIT_SHA"

# FIX: Tell the custom service account where to write the build logs
options:
  logging: CLOUD_LOGGING_ONLY
